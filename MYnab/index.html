    <link rel="manifest" href="manifest.json">
    <script type="text/javascript">
        window.addEventListener('load', () => {
            registerSW();
        });

        // Register the Service Worker
        async function registerSW() {
            if ('serviceWorker' in navigator) {
                try {
                    await navigator
                        .serviceWorker
                        .register('serviceworker.js');
                }
                catch (e) {
                    console.log('SW registration failed');
                }
            }
        }
    </script>
    <script src="https://cdn.plot.ly/plotly-2.4.2.min.js"></script><!-- Source: https://cdn.plot.ly/ -->
    <script src="mynab.js"></script>
    <script>
        function loadviews() {
            try {
                sumthisdata()
            } catch (error) {
                console.error(error)
            }
            plotthisdata()
            if (sessionStorage.getItem('api') != null) {
                document.getElementById('ynabauth').hidden = true
                console.log(DB_NAME)
                findlastdata()
            } else {
                document.getElementById('load').disabled = true;
                url = document.location.href.split("#")
                if (url[1] != null) {
                    c = url[1].split('&')[0].split('=')[0]
                    t = url[1].split('&')[0].split('=')[1]
                    if (c == 'access_token') {
                        sessionStorage.setItem('api', t);
                        setTimeout(showAuth, 72000);
                        document.location.href = url[0]
                    }
                }
            }
        }
    </script>
